<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS申请系统</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }

        .error-message {
            display: block;
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
        }

        .success-message {
            display: none;
            background-color: #27ae60;
            color: #fff;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }

        .upload-group {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .upload-group label {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .upload-hint {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .file-upload-wrapper {
            position: relative;
            display: inline-block;
        }

        .upload-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .upload-button:hover {
            background-color: #2980b9;
        }

        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .preview-container {
            margin-top: 15px;
            text-align: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: none;
        }

        .preview-image.show {
            display: block;
        }

        .delete-btn {
            margin-top: 10px;
            padding: 8px 20px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: none;
        }

        .delete-btn.show {
            display: inline-block;
        }

        .file-info {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .upload-status {
            margin-top: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .upload-status.success {
            color: #27ae60;
        }

        .upload-status.error {
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>通付宝POS申请系统</h1>
        <form id="posForm" name="posForm" method="POST" action="/?success=true" enctype="multipart/form-data" data-netlify="true">
            <input type="hidden" name="form-name" value="posForm">
            
            <div class="form-group">
                <label for="merchantName">商户名称 *</label>
                <input type="text" id="merchantName" name="merchantName" required>
                <span class="error-message" id="merchantNameError"></span>
            </div>

            <div class="form-group">
                <label for="contactPerson">联系人 *</label>
                <input type="text" id="contactPerson" name="contactPerson" required>
                <span class="error-message" id="contactPersonError"></span>
            </div>

            <div class="form-group">
                <label for="phone">联系电话 *</label>
                <input type="tel" id="phone" name="phone" required>
                <span class="error-message" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="businessAddress">经营地址 *</label>
                <textarea id="businessAddress" name="businessAddress" rows="3" required></textarea>
                <span class="error-message" id="businessAddressError"></span>
            </div>

            <div class="form-group">
                <label for="businessType">经营类型 *</label>
                <select id="businessType" name="businessType" required>
                    <option value="">请选择</option>
                    <option value="零售">零售</option>
                    <option value="餐饮">餐饮</option>
                    <option value="娱乐">娱乐</option>
                    <option value="医疗">医疗</option>
                    <option value="其他">其他</option>
                </select>
                <span class="error-message" id="businessTypeError"></span>
            </div>

            <div class="form-group">
                <label for="idCard">身份证号 *</label>
                <input type="text" id="idCard" name="idCard" required>
                <span class="error-message" id="idCardError"></span>
            </div>

            <div class="form-group">
                <label for="bankCard">银行卡号 *</label>
                <input type="text" id="bankCard" name="bankCard" required>
                <span class="error-message" id="bankCardError"></span>
            </div>

            <div class="form-group">
                <label for="bankName">开户银行 *</label>
                <input type="text" id="bankName" name="bankName" required>
                <span class="error-message" id="bankNameError"></span>
            </div>

            <div class="upload-group">
                <label for="idCardFront">上传身份证正面照片 *（测试用）</label>
                <div class="upload-hint">支持JPG、PNG格式，文件大小不超过5MB</div>
                <div class="file-upload-wrapper">
                    <button type="button" class="upload-button">选择文件</button>
                    <input type="file" id="idCardFront" name="idCardFront" accept="image/jpeg,image/png" required>
                </div>
                <button type="button" class="delete-btn" id="idCardFrontDelete">删除</button>
                <div class="preview-container">
                    <img id="idCardFrontPreview" class="preview-image" alt="身份证正面预览">
                </div>
                <div class="file-info" id="idCardFrontInfo"></div>
                <div class="upload-status" id="idCardFrontStatus"></div>
            </div>

            <button type="submit" class="submit-btn">提交申请</button>
        </form>

        <div id="successMessage" class="success-message">
            尊敬的用户，您的POS申请，我们已经收到，会有工作人员与你联系，请保持电话畅通。
        </div>
    </div>

    <script>
        const input = document.getElementById('idCardFront');
        const deleteBtn = document.getElementById('idCardFrontDelete');
        
        if (input) {
            input.addEventListener('change', function(e) {
                handleFileSelect(e, 'idCardFront');
            });
        }
        
        if (deleteBtn) {
            deleteBtn.addEventListener('click', function() {
                deleteFile('idCardFront');
            });
        }

        function handleFileSelect(event, fieldId) {
            const file = event.target.files[0];
            
            if (!file) return;

            const statusEl = document.getElementById(fieldId + 'Status');
            const infoEl = document.getElementById(fieldId + 'Info');
            const previewEl = document.getElementById(fieldId + 'Preview');
            const deleteBtnEl = document.getElementById(fieldId + 'Delete');

            statusEl.className = 'upload-status';
            statusEl.textContent = '';

            const validTypes = ['image/jpeg', 'image/png'];
            if (!validTypes.includes(file.type)) {
                statusEl.textContent = '错误：只支持JPG和PNG格式';
                statusEl.classList.add('error');
                event.target.value = '';
                return;
            }

            const maxSizeBytes = 5 * 1024 * 1024;
            if (file.size > maxSizeBytes) {
                statusEl.textContent = '错误：文件大小不能超过5MB';
                statusEl.classList.add('error');
                event.target.value = '';
                return;
            }

            infoEl.textContent = '文件名：' + file.name + ' | 大小：' + formatFileSize(file.size);

            const reader = new FileReader();
            reader.onload = function(e) {
                previewEl.src = e.target.result;
                previewEl.classList.add('show');
                deleteBtnEl.classList.add('show');
                statusEl.textContent = '✓ 文件已选择';
                statusEl.classList.add('success');
            };
            reader.readAsDataURL(file);
        }

        function deleteFile(fieldId) {
            const input = document.getElementById(fieldId);
            const previewEl = document.getElementById(fieldId + 'Preview');
            const deleteBtnEl = document.getElementById(fieldId + 'Delete');
            const infoEl = document.getElementById(fieldId + 'Info');
            const statusEl = document.getElementById(fieldId + 'Status');

            input.value = '';
            previewEl.src = '';
            previewEl.classList.remove('show');
            deleteBtnEl.classList.remove('show');
            infoEl.textContent = '';
            statusEl.textContent = '';
            statusEl.className = 'upload-status';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('posForm');
            const successMessage = document.getElementById('successMessage');
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.has('success')) {
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                    window.history.replaceState({}, document.title, '/');
                }, 8000);
            }

            form.addEventListener('submit', function(e) {
                if (!validateForm()) {
                    e.preventDefault();
                }
            });

            function validateForm() {
                let isValid = true;

                const merchantName = document.getElementById('merchantName').value.trim();
                if (!merchantName) {
                    showError('merchantNameError', '请输入商户名称');
                    isValid = false;
                } else {
                    hideError('merchantNameError');
                }

                const contactPerson = document.getElementById('contactPerson').value.trim();
                if (!contactPerson) {
                    showError('contactPersonError', '请输入联系人');
                    isValid = false;
                } else {
                    hideError('contactPersonError');
                }

                const phone = document.getElementById('phone').value.trim();
                const phoneRegex = /^1[3-9]\d{9}$/;
                if (!phone) {
                    showError('phoneError', '请输入联系电话');
                    isValid = false;
                } else if (!phoneRegex.test(phone)) {
                    showError('phoneError', '请输入有效的联系电话');
                    isValid = false;
                } else {
                    hideError('phoneError');
                }

                const businessAddress = document.getElementById('businessAddress').value.trim();
                if (!businessAddress) {
                    showError('businessAddressError', '请输入经营地址');
                    isValid = false;
                } else {
                    hideError('businessAddressError');
                }

                const businessType = document.getElementById('businessType').value;
                if (!businessType) {
                    showError('businessTypeError', '请选择经营类型');
                    isValid = false;
                } else {
                    hideError('businessTypeError');
                }

                const idCard = document.getElementById('idCard').value.trim();
                const idCardRegex = /^[1-9]\d{5}(18|19|20)\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{3}[\dXx]$/;
                if (!idCard) {
                    showError('idCardError', '请输入身份证号');
                    isValid = false;
                } else if (!idCardRegex.test(idCard)) {
                    showError('idCardError', '请输入有效的身份证号');
                    isValid = false;
                } else {
                    hideError('idCardError');
                }

                const bankCard = document.getElementById('bankCard').value.trim();
                const bankCardRegex = /^\d{16,19}$/;
                if (!bankCard) {
                    showError('bankCardError', '请输入银行卡号');
                    isValid = false;
                } else if (!bankCardRegex.test(bankCard)) {
                    showError('bankCardError', '请输入有效的银行卡号');
                    isValid = false;
                } else {
                    hideError('bankCardError');
                }

                const bankName = document.getElementById('bankName').value.trim();
                if (!bankName) {
                    showError('bankNameError', '请输入开户银行');
                    isValid = false;
                } else {
                    hideError('bankNameError');
                }

                const fileInput = document.getElementById('idCardFront');
                const fileStatus = document.getElementById('idCardFrontStatus');
                if (!fileInput.files || !fileInput.files[0]) {
                    fileStatus.textContent = '请上传身份证正面照片';
                    fileStatus.classList.add('error');
                    isValid = false;
                }

                return isValid;
            }

            function showError(elementId, message) {
                document.getElementById(elementId).textContent = message;
            }

            function hideError(elementId) {
                document.getElementById(elementId).textContent = '';
            }
        });
    </script>
</body>
</html>
