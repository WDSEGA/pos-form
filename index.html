<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通付宝POS申请系统</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: block;
        }

        .success-message {
            display: none;
            background-color: #27ae60;
            color: #fff;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>通付宝POS申请系统</h1>
        
        <form id="posForm" name="posForm" method="POST" action="/?success=true" data-netlify="true">
            <input type="hidden" name="form-name" value="posForm">
            
            <div class="form-group">
                <label for="merchantName">商户名称 *</label>
                <input type="text" id="merchantName" name="merchantName" required>
                <span class="error-message" id="merchantNameError"></span>
            </div>

            <div class="form-group">
                <label for="contactPerson">联系人 *</label>
                <input type="text" id="contactPerson" name="contactPerson" required>
                <span class="error-message" id="contactPersonError"></span>
            </div>

            <div class="form-group">
                <label for="phone">联系电话 *</label>
                <input type="tel" id="phone" name="phone" required>
                <span class="error-message" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="businessAddress">经营地址 *</label>
                <textarea id="businessAddress" name="businessAddress" rows="3" required></textarea>
                <span class="error-message" id="businessAddressError"></span>
            </div>

            <div class="form-group">
                <label for="businessType">经营类型 *</label>
                <select id="businessType" name="businessType" required>
                    <option value="">请选择</option>
                    <option value="零售">零售</option>
                    <option value="餐饮">餐饮</option>
                    <option value="娱乐">娱乐</option>
                    <option value="医疗">医疗</option>
                    <option value="其他">其他</option>
                </select>
                <span class="error-message" id="businessTypeError"></span>
            </div>

            <div class="form-group">
                <label for="idCard">身份证号 *</label>
                <input type="text" id="idCard" name="idCard" required>
                <span class="error-message" id="idCardError"></span>
            </div>

            <div class="form-group">
                <label for="bankCard">银行卡号 *</label>
                <input type="text" id="bankCard" name="bankCard" required>
                <span class="error-message" id="bankCardError"></span>
            </div>

            <div class="form-group">
                <label for="bankName">开户银行 *</label>
                <input type="text" id="bankName" name="bankName" required>
                <span class="error-message" id="bankNameError"></span>
            </div>

            <button type="submit" class="submit-btn">提交申请</button>
        </form>

        <div id="successMessage" class="success-message">
            尊敬的用户，您的POS申请，我们已经收到，会有工作人员与你联系，请保持电话畅通。
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('posForm');
            const successMessage = document.getElementById('successMessage');
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.has('success')) {
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                    window.history.replaceState({}, document.title, '/');
                }, 8000);
            }

            form.addEventListener('submit', function(e) {
                if (!validateForm()) {
                    e.preventDefault();
                }
            });

            function validateForm() {
                let isValid = true;

                const merchantName = document.getElementById('merchantName').value.trim();
                if (!merchantName) {
                    document.getElementById('merchantNameError').textContent = '请输入商户名称';
                    isValid = false;
                } else {
                    document.getElementById('merchantNameError').textContent = '';
                }

                const contactPerson = document.getElementById('contactPerson').value.trim();
                if (!contactPerson) {
                    document.getElementById('contactPersonError').textContent = '请输入联系人';
                    isValid = false;
                } else {
                    document.getElementById('contactPersonError').textContent = '';
                }

                const phone = document.getElementById('phone').value.trim();
                const phoneRegex = /^1[3-9]\d{9}$/;
                if (!phone) {
                    document.getElementById('phoneError').textContent = '请输入联系电话';
                    isValid = false;
                } else if (!phoneRegex.test(phone)) {
                    document.getElementById('phoneError').textContent = '请输入有效的联系电话';
                    isValid = false;
                } else {
                    document.getElementById('phoneError').textContent = '';
                }

                const businessAddress = document.getElementById('businessAddress').value.trim();
                if (!businessAddress) {
                    document.getElementById('businessAddressError').textContent = '请输入经营地址';
                    isValid = false;
                } else {
                    document.getElementById('businessAddressError').textContent = '';
                }

                const businessType = document.getElementById('businessType').value;
                if (!businessType) {
                    document.getElementById('businessTypeError').textContent = '请选择经营类型';
                    isValid = false;
                } else {
                    document.getElementById('businessTypeError').textContent = '';
                }

                const idCard = document.getElementById('idCard').value.trim();
                const idCardRegex = /^[1-9]\d{5}(18|19|20)\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{3}[\dXx]$/;
                if (!idCard) {
                    document.getElementById('idCardError').textContent = '请输入身份证号';
                    isValid = false;
                } else if (!idCardRegex.test(idCard)) {
                    document.getElementById('idCardError').textContent = '请输入有效的身份证号';
                    isValid = false;
                } else {
                    document.getElementById('idCardError').textContent = '';
                }

                const bankCard = document.getElementById('bankCard').value.trim();
                const bankCardRegex = /^\d{16,19}$/;
                if (!bankCard) {
                    document.getElementById('bankCardError').textContent = '请输入银行卡号';
                    isValid = false;
                } else if (!bankCardRegex.test(bankCard)) {
                    document.getElementById('bankCardError').textContent = '请输入有效的银行卡号';
                    isValid = false;
                } else {
                    document.getElementById('bankCardError').textContent = '';
                }

                const bankName = document.getElementById('bankName').value.trim();
                if (!bankName) {
                    document.getElementById('bankNameError').textContent = '请输入开户银行';
                    isValid = false;
                } else {
                    document.getElementById('bankNameError').textContent = '';
                }

                return isValid;
            }
        });
    </script>
</body>
</html>
